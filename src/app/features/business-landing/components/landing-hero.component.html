<section
  class="hero"
  id="hero"
  (mouseenter)="setHeroPaused(true)"
  (mouseleave)="setHeroPaused(false)"
>
  <div class="slider-controls">
    <button type="button" class="slider-arrow arrow-next" (click)="nextSlide()" aria-label="Next">
      <i data-lucide="chevron-left"></i>
    </button>
    <button type="button" class="slider-arrow arrow-prev" (click)="prevSlide()" aria-label="Previous">
      <i data-lucide="chevron-right"></i>
    </button>
    <div class="slider-dots">
      @for (slide of slides(); track slide.id; let idx = $index) {
        <div class="dot" [class.active]="currentSlide() === idx" (click)="goToSlide(idx)"></div>
      }
    </div>
  </div>

  @for (slide of slides(); track slide.id; let idx = $index) {
    <div class="slide" [class.active]="currentSlide() === idx">
      <div class="slide-content-wrap">
        <div class="slide-text">
          <h1>{{ slide.title }}</h1>
          <p>{{ slide.description }}</p>
          <div class="hero-btns">
            <a routerLink="/booking/consulting" class="btn btn-primary">{{ locale.t('consultFree') }}</a>
            <a routerLink="/pages/login" class="btn btn-outline">{{ locale.t('ourServices') }}</a>
          </div>
        </div>
        <div class="slide-image">
          <div class="slide-stripe"></div>
          <img [src]="slide.imageUrl" [alt]="slide.title" />
        </div>
      </div>
    </div>
  }
</section>
