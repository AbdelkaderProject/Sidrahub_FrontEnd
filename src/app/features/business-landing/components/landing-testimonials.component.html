<section class="video-sec">
  <div class="bl-container">
    <div class="section-header">
      <div class="section-line"></div>
      <div class="section-label">{{ locale.t('videoLabel') }}</div>
      <h2 class="section-title">{{ locale.t('videoTitle') }}</h2>
    </div>
    <div class="video-grid">
      <div class="video-card">
        <div class="vid-thumb" (click)="openVideo()" role="button" tabindex="0">
          <img src="https://picsum.photos/300/500?random=11" alt="" />
          <button type="button" class="play-btn"><i data-lucide="play" fill="white"></i></button>
        </div>
        <h4 class="vid-name">{{ locale.t('vid1Name') }}</h4>
        <p class="vid-role">{{ locale.t('vid1Role') }}</p>
      </div>
      <div class="video-card">
        <div class="vid-thumb" (click)="openVideo()" role="button" tabindex="0">
          <img src="https://picsum.photos/300/500?random=12" alt="" />
          <button type="button" class="play-btn"><i data-lucide="play" fill="white"></i></button>
        </div>
        <h4 class="vid-name">{{ locale.t('vid2Name') }}</h4>
        <p class="vid-role">{{ locale.t('vid2Role') }}</p>
      </div>
      <div class="video-card">
        <div class="vid-thumb" (click)="openVideo()" role="button" tabindex="0">
          <img src="https://picsum.photos/300/500?random=13" alt="" />
          <button type="button" class="play-btn"><i data-lucide="play" fill="white"></i></button>
        </div>
        <h4 class="vid-name">{{ locale.t('vid3Name') }}</h4>
        <p class="vid-role">{{ locale.t('vid3Role') }}</p>
      </div>
      <div class="video-card">
        <div class="vid-thumb" (click)="openVideo()" role="button" tabindex="0">
          <img src="https://picsum.photos/300/500?random=14" alt="" />
          <button type="button" class="play-btn"><i data-lucide="play" fill="white"></i></button>
        </div>
        <h4 class="vid-name">{{ locale.t('vid4Name') }}</h4>
        <p class="vid-role">{{ locale.t('vid4Role') }}</p>
      </div>
    </div>
  </div>
</section>

<div
  class="modal"
  id="vidModal"
  [class.active]="videoModalOpen()"
  (click)="onModalBackdrop($event)"
>
  <button type="button" class="close-modal" (click)="closeVideo()">&times;</button>
  <div class="modal-content">
    <div
      style="
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 1.5rem;
      "
    >
      <i data-lucide="play-circle" style="width: 64px; height: 64px; color: var(--green-base)"></i>
    </div>
  </div>
</div>
