<section class="video-sec">
  <div class="bl-container">
    <div class="section-header">
      <div class="section-line"></div>
      <div class="section-label">{{ locale.t('videoLabel') }}</div>
      <h2 class="section-title">{{ locale.t('videoTitle') }}</h2>
    </div>
    <div class="video-grid">
      <div class="video-card" *ngFor="let review of displayedReviews(); trackBy: trackByReviewId">
        <div
          class="vid-thumb"
          [class.vid-thumb--clickable]="getReviewMedia(review)"
          [class.vid-thumb--placeholder]="!getReviewMedia(review)"
          [attr.role]="getReviewMedia(review) ? 'button' : null"
          [attr.tabindex]="getReviewMedia(review) ? 0 : null"
          (click)="openReview(review)">
          <video *ngIf="getReviewMedia(review) as reviewMedia; else fallbackReviewMedia" [src]="reviewMedia" [attr.aria-label]="getReviewName(review)" muted preload="metadata"></video>
          <ng-template #fallbackReviewMedia>
            <div class="review-placeholder">
              <span>{{ getReviewName(review).slice(0, 1) }}</span>
            </div>
          </ng-template>

          <button type="button" class="play-btn" *ngIf="getReviewMedia(review)">
            <i data-lucide="play" fill="white"></i>
          </button>
        </div>
        <h4 class="vid-name">{{ getReviewName(review) }}</h4>
        <p class="vid-role">{{ getReviewOpinion(review) }}</p>
      </div>
    </div>
  </div>
</section>

<div class="modal" [class.active]="activeVideoUrl()" (click)="onModalBackdrop($event)">
  <button type="button" class="close-modal" (click)="closeVideo()">&times;</button>
  <div class="modal-content modal-content--video">
    <video *ngIf="activeVideoUrl() as videoUrl" [src]="videoUrl" controls autoplay class="review-modal-video"></video>
  </div>
</div>
