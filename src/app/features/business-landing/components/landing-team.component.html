<section class="team-sec">
  <div class="bl-container">
    <div class="section-header">
      <div class="section-label">{{ locale.t('teamLabel') }}</div>
      <h2 class="section-title">{{ locale.t('teamTitle') }}</h2>
    </div>
    <div class="team-grid">
      @for (member of visibleMembers(); track member.image + '-' + currentIndex()) {
        <div class="team-card">
          <div class="team-media">
            <img [src]="member.image" alt="" class="team-img" />
            <div class="team-socials">
              <a href="#" aria-label="Facebook" class="team-social-link">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M13.5 22v-8h2.7l.4-3h-3.1V9.1c0-.9.3-1.6 1.7-1.6H17V4.8c-.3 0-1.3-.1-2.5-.1-2.5 0-4.2 1.5-4.2 4.4V11H7.5v3h2.8v8h3.2Z"/></svg>
              </a>
              <a href="#" aria-label="Instagram" class="team-social-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1"/></svg>
              </a>
              <a href="#" aria-label="LinkedIn" class="team-social-link">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.94 8.5A1.56 1.56 0 1 0 6.94 5.4a1.56 1.56 0 0 0 0 3.1ZM5.6 9.8h2.7V18H5.6V9.8Zm4.4 0h2.6v1.1h.04c.36-.68 1.24-1.4 2.55-1.4 2.73 0 3.24 1.8 3.24 4.13V18h-2.7v-3.87c0-.92-.02-2.1-1.28-2.1-1.28 0-1.47 1-1.47 2.03V18H10V9.8Z"/></svg>
              </a>
              <a href="#" aria-label="Twitter" class="team-social-link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path
                    d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L1.254 2.25H8.08l4.259 5.622 5.905-5.622zM17.083 19.77h1.833L7.084 4.126H5.117z" />
                </svg>
              </a>
            </div>
          </div>
          <div class="team-info">
            <h4 class="team-name">{{ member.name }}</h4>
            <p class="team-role">{{ member.role }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
