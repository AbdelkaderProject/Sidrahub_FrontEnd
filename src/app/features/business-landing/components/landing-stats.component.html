<section class="stats-sec" id="stats-section" #statsSection>
  <div class="bl-container">
    <div class="stats-grid">
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">
          <i data-lucide="bar-chart-3" width="28" height="28"></i>
        </div>
        <div class="stat-num">{{ n28() }}+</div>
        <div class="stat-label">{{ locale.t('statYears') }}</div>
      </div>
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">
          <i data-lucide="target" width="28" height="28"></i>
        </div>
        <div class="stat-num">{{ n750() }}+</div>
        <div class="stat-label">{{ locale.t('statStories') }}</div>
      </div>
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">
          <i data-lucide="handshake" width="28" height="28"></i>
        </div>
        <div class="stat-num">{{ n1300() }}+</div>
        <div class="stat-label">{{ locale.t('statClients') }}</div>
      </div>
      <div class="stat-item">
        <div class="stat-icon" aria-hidden="true">
          <i data-lucide="users" width="28" height="28"></i>
        </div>
        <div class="stat-num">{{ n60() }}+</div>
        <div class="stat-label">{{ locale.t('statTeam') }}</div>
      </div>
    </div>
  </div>
</section>
