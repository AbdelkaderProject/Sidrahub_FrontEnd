<p-dialog
  [(visible)]="visible"
  [header]="header"
  [modal]="modal"
  [style]="style"
  [styleClass]="resolvedStyleClass"
  [draggable]="draggable"
  [resizable]="resizable"
  [closable]="closable"
  [closeOnEscape]="closeOnEscape"
  [dismissableMask]="dismissableMask"
  [appendTo]="appendTo"
  [baseZIndex]="baseZIndex"
  [autoZIndex]="autoZIndex"
  (onHide)="handleHide()"
  (onShow)="onShow.emit()"
>
  <ng-content></ng-content>
</p-dialog>
