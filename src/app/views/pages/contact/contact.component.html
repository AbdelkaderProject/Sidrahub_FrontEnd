<section class="contact-hero">
  <div class="contact-hero__overlay"></div>
  <div class="contact-hero__content">
    <h1>تواصل معنا</h1>
    <div class="breadcrumb">الرئيسية &gt; تواصل معنا</div>
  </div>
</section>

<section class="contact-form-section">
  <div class="contact-form-container">
    <div class="section-heading">
      <div class="section-heading__line"></div>
      <h2>تواصل معنا</h2>
      <p>يرجى الاتصال بنا باستخدام النموذج وسنقوم بالرد عليك في أقرب وقت ممكن</p>
    </div>

    <form class="contact-form" [formGroup]="contactForm" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="form-field">
          <label for="name">الاسم</label>
          <input id="name" type="text" formControlName="name" placeholder="الاسم" />
          <div class="field-error" *ngIf="hasError('name')">هذا الحقل مطلوب</div>
        </div>

        <div class="form-field">
          <label for="email">البريد الإلكتروني</label>
          <input id="email" type="email" formControlName="email" placeholder="البريد الإلكتروني" />
          <div class="field-error" *ngIf="hasError('email')">يرجى إدخال بريد إلكتروني صحيح</div>
        </div>

        <div class="form-field">
          <label for="phone">رقم الجوال</label>
          <input id="phone" type="text" formControlName="phone" placeholder="رقم الجوال" />
          <div class="field-error" *ngIf="hasError('phone')">هذا الحقل مطلوب</div>
        </div>

        <div class="form-field">
          <label for="subject">الموضوع</label>
          <input id="subject" type="text" formControlName="subject" placeholder="الموضوع" />
          <div class="field-error" *ngIf="hasError('subject')">هذا الحقل مطلوب</div>
        </div>

        <div class="form-field form-field--full">
          <label for="message">الرسالة</label>
          <textarea id="message" formControlName="message" placeholder="الرسالة"></textarea>
          <div class="field-error" *ngIf="hasError('message')">هذا الحقل مطلوب</div>
        </div>
      </div>

      <div class="contact-actions">
        <button type="submit" class="submit-btn">إرسال</button>
      </div>
    </form>
  </div>
</section>
