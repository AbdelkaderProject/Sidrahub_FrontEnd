<div class="login-container">
  <c-container breakpoint="md">
    <c-row class="justify-content-center">
      <c-col md="7" lg="6" xl="5">
        <c-card class="login-card">
          <c-card-body class="p-4">
            <div *ngIf="successMessage" class="alert alert-success alert-dismissible fade show" role="alert">
              <svg cIcon name="cil-check" class="me-2"></svg>
              {{ successMessage }}
              <button type="button" class="btn-close" (click)="successMessage = ''"></button>
            </div>

            <div *ngIf="errorMessage" class="alert alert-danger alert-dismissible fade show" role="alert">
              <svg cIcon name="cil-x-circle" class="me-2"></svg>
              {{ errorMessage }}
              <button type="button" class="btn-close" (click)="errorMessage = ''"></button>
            </div>

            <form (ngSubmit)="onSubmit()" cForm class="login-form">
              <div class="text-center mb-4">
                <img class="login-logo" src="https://sidrahub.com/images/logo.png" alt="SidraHub logo">
                <h1 class="login-title">Create Account</h1>
                <p class="login-subtitle">Register a new account and start using SidraHub</p>
              </div>

              <div class="mb-3">
                <label class="form-label mb-1">Full Name <span class="text-danger">*</span></label>
                <c-input-group>
                  <span cInputGroupText class="input-icon">
                    <svg cIcon name="cil-user"></svg>
                  </span>
                  <input
                    cFormControl
                    class="form-input"
                    placeholder="Full name"
                    [(ngModel)]="form.fullName"
                    name="fullName"
                    [disabled]="isLoading"
                    required
                  />
                </c-input-group>
              </div>

              <div class="mb-3">
                <label class="form-label mb-1">Email <span class="text-danger">*</span></label>
                <c-input-group>
                  <span cInputGroupText class="input-icon">&#64;</span>
                  <input
                    type="email"
                    cFormControl
                    class="form-input"
                    placeholder="Email"
                    [(ngModel)]="form.email"
                    name="email"
                    [disabled]="isLoading"
                    required
                    autocomplete="email"
                  />
                </c-input-group>
              </div>

              <div class="mb-3">
                <label class="form-label mb-1">Phone Number <span class="text-danger">*</span></label>
                <c-input-group>
                  <span cInputGroupText class="input-icon">
                    <svg cIcon name="cil-phone"></svg>
                  </span>
                  <input
                    cFormControl
                    class="form-input"
                    placeholder="Phone number"
                    [(ngModel)]="form.phoneNumber"
                    name="phoneNumber"
                    [disabled]="isLoading"
                    required
                    autocomplete="tel"
                  />
                </c-input-group>
              </div>

              <div class="mb-3">
                <label class="form-label mb-1">Password <span class="text-danger">*</span></label>
                <c-input-group>
                  <span cInputGroupText class="input-icon">
                    <svg cIcon name="cil-lock-locked"></svg>
                  </span>
                  <input
                    [type]="showPassword ? 'text' : 'password'"
                    cFormControl
                    class="form-input"
                    placeholder="Password"
                    [(ngModel)]="form.password"
                    name="password"
                    [disabled]="isLoading"
                    required
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    [disabled]="isLoading"
                    (click)="togglePasswordVisibility()"
                    [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'"
                  >
                    @if (showPassword) {
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M10.6 10.6a2 2 0 102.8 2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9.36 5.56A10.94 10.94 0 0112 5c5.05 0 9.27 3.11 10.5 7-.52 1.03-1.2 1.97-2.02 2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6.23 6.23C4.17 7.42 2.61 9.08 1.5 12c.9 2.35 2.76 4.33 5.1 5.57A10.76 10.76 0 0012 19c1.61 0 3.14-.33 4.53-.92" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    } @else {
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M1.5 12S5.5 5 12 5s10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                      </svg>
                    }
                  </button>
                </c-input-group>
              </div>

              <div class="mb-3">
                <label class="form-label mb-1">Confirm Password <span class="text-danger">*</span></label>
                <c-input-group>
                  <span cInputGroupText class="input-icon">
                    <svg cIcon name="cil-lock-locked"></svg>
                  </span>
                  <input
                    [type]="showConfirmPassword ? 'text' : 'password'"
                    cFormControl
                    class="form-input"
                    placeholder="Confirm password"
                    [(ngModel)]="form.confirmPassword"
                    name="confirmPassword"
                    [disabled]="isLoading"
                    required
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="password-toggle"
                    [disabled]="isLoading"
                    (click)="toggleConfirmPasswordVisibility()"
                    [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'"
                  >
                    @if (showConfirmPassword) {
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M3 3l18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        <path d="M10.6 10.6a2 2 0 102.8 2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M9.36 5.56A10.94 10.94 0 0112 5c5.05 0 9.27 3.11 10.5 7-.52 1.03-1.2 1.97-2.02 2.8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M6.23 6.23C4.17 7.42 2.61 9.08 1.5 12c.9 2.35 2.76 4.33 5.1 5.57A10.76 10.76 0 0012 19c1.61 0 3.14-.33 4.53-.92" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                      </svg>
                    } @else {
                      <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
                        <path d="M1.5 12S5.5 5 12 5s10.5 7 10.5 7-4 7-10.5 7S1.5 12 1.5 12z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/>
                      </svg>
                    }
                  </button>
                </c-input-group>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4">
                <c-form-check>
                  <input
                    type="checkbox"
                    cFormCheckInput
                    id="rememberRegister"
                    [(ngModel)]="form.rememberMe"
                    name="rememberMe"
                    [disabled]="isLoading"
                  />
                  <label cFormCheckLabel for="rememberRegister" class="remember-label">Remember me</label>
                </c-form-check>
              </div>

              <button
                cButton
                class="login-button w-100"
                color="primary"
                type="submit"
                [disabled]="isLoading"
              >
                <span *ngIf="!isLoading">Create Account</span>
                <span *ngIf="isLoading">
                  <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                  Loading...
                </span>
              </button>

              <p class="auth-switch text-center mt-4 mb-0">
                Already have an account?
                <a routerLink="/pages/login">Sign in</a>
              </p>
            </form>
          </c-card-body>
        </c-card>
      </c-col>
    </c-row>
  </c-container>
</div>
